<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winner's Secret - 실제 1등 당첨자의 번호 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="main-container">
        <h1>Winner's Secret</h1>
        <div class="subtitle">실제 1등 당첨자의 알고리즘과 당신의 사주가 만났습니다.</div>

        <div id="input-section">
            <div class="form-group">
                <label for="birthdate">생년월일</label>
                <input type="date" id="birthdate" required>
            </div>
            <div class="form-group">
                <label for="gender">성별</label>
                <select id="gender">
                    <option value="male">남성</option>
                    <option value="female">여성</option>
                </select>
            </div>
            <button onclick="startAnalysis()">오늘의 맞춤 번호 추출하기</button>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <div style="color: var(--gold-secondary);">개인 정보와 오늘의 일진(日辰)을 동기화 중입니다...</div>
        </div>

        <div id="result">
            <div class="fortune-box">
                <div class="fortune-title" id="fortune-title">오늘의 재물운</div>
                <div id="fortune-desc" style="line-height: 1.5; color: #ddd;"></div>
            </div>

            <div style="margin-bottom: 15px; font-size: 14px; color: var(--gold-secondary); text-align: center;">
                ▼ 사주 명리학과 통계가 결합된 5세트 ▼
            </div>

            <div id="lotto-results">
                </div>

            <button onclick="resetApp()" style="margin-top: 20px; background: #333; color: white;">초기화 및 다시 하기</button>
        </div>

        <div class="footer-note">
            ※ 본 서비스는 1등 당첨자의 통계적 기법과 재미를 위한 운세 요소를 결합한 것입니다.<br>과도한 몰입은 금물이며 소액으로 즐기시길 바랍니다.
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
