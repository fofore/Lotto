<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winner's Secret - 1등 당첨자의 비법</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="main-container">
        <h1>Winner's Secret</h1>
        <div class="subtitle">실제 1등 당첨자의 알고리즘과 당신의 사주가 만났습니다.</div>

        <div id="input-section">
            <div class="form-group">
                <label for="birthdate">생년월일</label>
                <input type="date" id="birthdate" required>
            </div>
            <div class="form-group">
                <label for="birthtime">태어난 시간 (선택)</label>
                <select id="birthtime">
                    <option value="unknown">모름 (선택 안함)</option>
                    <option value="ja">자시 (23:30 ~ 01:29)</option>
                    <option value="chuk">축시 (01:30 ~ 03:29)</option>
                    <option value="in">인시 (03:30 ~ 05:29)</option>
                    <option value="myo">묘시 (05:30 ~ 07:29)</option>
                    <option value="jin">진시 (07:30 ~ 09:29)</option>
                    <option value="sa">사시 (09:30 ~ 11:29)</option>
                    <option value="o">오시 (11:30 ~ 13:29)</option>
                    <option value="mi">미시 (13:30 ~ 15:29)</option>
                    <option value="shin">신시 (15:30 ~ 17:29)</option>
                    <option value="yu">유시 (17:30 ~ 19:29)</option>
                    <option value="sul">술시 (19:30 ~ 21:29)</option>
                    <option value="hae">해시 (21:30 ~ 23:29)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="gender">성별</label>
                <select id="gender">
                    <option value="male">남성</option>
                    <option value="female">여성</option>
                </select>
            </div>
            <button onclick="startAnalysis()">오늘의 맞춤 번호 추출하기</button>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <div style="color: var(--gold-secondary);">사주 명식과 오늘의 일진(日辰)을 분석 중입니다...</div>
        </div>

        <div id="result-wrapper">
            <div id="capture-area">
                <div style="text-align: center; margin-bottom: 15px; color: var(--gold-primary); font-weight: bold; font-size: 20px;">
                    Winner's Secret
                </div>
                
                <div class="fortune-box">
                    <div class="fortune-title" id="fortune-title">오늘의 재물운</div>
                    <div id="fortune-desc" style="line-height: 1.5; color: #ddd;"></div>
                </div>

                <div style="margin-bottom: 15px; font-size: 14px; color: var(--gold-secondary); text-align: center;">
                    ▼ 사주 명리학과 통계가 결합된 5세트 ▼
                </div>

                <div id="lotto-results">
                    </div>
                
                <div class="watermark" id="watermark">
                    ※ 본 결과는 개인 맞춤형 운세 기반 로또 번호입니다.
                </div>
            </div>

            <div class="button-group">
                <button class="btn-save" onclick="saveAsImage()">📷 이미지로 저장</button>
                <button class="btn-secondary" onclick="resetApp()">다시 하기</button>
            </div>
        </div>

        <div class="footer-note">
            ※ 본 서비스는 1등 당첨자의 통계적 기법과 재미를 위한 운세 요소를 결합한 것입니다.<br>과도한 몰입은 금물이며 소액으로 즐기시길 바랍니다.
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
